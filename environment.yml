name: credit_recsys

channels:
  - pytorch          # official PyTorch builds
  - conda-forge      # faiss-cpu, implicit, umap-learn live here
  - defaults

dependencies:
  - python=3.11

  # ── Core data stack ────────────────────────────────────────────────────────
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - pyarrow>=14.0    # .parquet support used by preprocessing
  - scikit-learn>=1.3
  - tqdm>=4.66

  # ── Deep learning ──────────────────────────────────────────────────────────
  - pytorch>=2.0     # CPU build; change to pytorch-cuda=12.1 for GPU

  # ── Vector search ─────────────────────────────────────────────────────────
  - faiss-cpu>=1.7.4 # conda-forge build; avoids the pip wheel build issues

  # ── Notebooks & visualisation ──────────────────────────────────────────────
  - jupyter>=1.0
  - matplotlib>=3.8
  - seaborn>=0.13
  - umap-learn>=0.5.6

  # ── Testing ───────────────────────────────────────────────────────────────
  - pytest>=8.0

  # ── Pip-only packages (no conda build available) ──────────────────────────
  - pip:
    # ALS backend — fast C++ collaborative filtering
    - implicit>=0.7.2

    # API framework
    - fastapi>=0.110.0
    - uvicorn[standard]>=0.29.0
    - pydantic>=2.0.0

    # FastAPI TestClient dependency
    - httpx>=0.27.0

    # Table formatting for ablation study output
    - tabulate>=0.9.0

    # Kaggle CLI — download the LendingClub dataset
    - kaggle

    # ── Optional: LLM reranker (uncomment one) ────────────────────────────
    # - openai>=1.0.0
    # - anthropic>=0.25.0
